name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: >
          dotnet publish WebRandomizer/WebRandomizer.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -o publish/${{ matrix.rid }}

      - name: Archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath WEBRandomizer-${{ github.ref_name }}-${{ matrix.rid }}.zip

      - name: Archive (Linux)
        if: matrix.archive == 'tar'
        run: tar -czf WEBRandomizer-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz -C publish/${{ matrix.rid }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: WEBRandomizer-${{ github.ref_name }}-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WEBRandomizer-*.zip
            WEBRandomizer-*.tar.gz
          generate_release_notes: true
