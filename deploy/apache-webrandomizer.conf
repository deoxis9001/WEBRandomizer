<VirtualHost *:80>
    ServerName randomizer.example.com

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    # Transmet les vraies IPs au backend
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ErrorLog ${APACHE_LOG_DIR}/webrandomizer-error.log
    CustomLog ${APACHE_LOG_DIR}/webrandomizer-access.log combined
</VirtualHost>
